<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Password Card Mock</title>
    <link rel="stylesheet" href="index.css" />
  </head>

  <body>
    <main class="stage">
      <section class="card" aria-label="Password generator mock">
        <span class="arrow" aria-hidden="true"></span>

        <h1 class="title">
          Generate a <br />
          <span class="accent">random password</span>
        </h1>

        <p class="subtitle">Never use an insecure password again.</p>

        <!-- LENGTH INPUT (INT) -->
        <label class="lenLabel" for="pwLen">Password length</label>
        <input
          class="lenInput"
          id="pwLen"
          type="number"
          inputmode="numeric"
          min="4"
          max="64"
          placeholder="16"
        />

        <!-- BUTTON -->
        <button class="cta" id="generateBtn" type="button">
          Generate passwords
        </button>

        <hr class="divider" />

        <!-- PASSWORD BOXES -->
        <div class="outputs" role="group" aria-label="Generated passwords">
          <input class="pwbox" id="pw1" type="text" readonly />
          <input class="pwbox" id="pw2" type="text" readonly />
        </div>
      </section>
    </main>

    <script src="index.js"></script>
  </body>
</html>
