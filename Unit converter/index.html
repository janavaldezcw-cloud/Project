<!-- index.html -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Metric/Imperial Unit Conversion</title>
    <link rel="stylesheet" href="index.css" />
    
  </head>

  <body>
    <main class="app">
      <header class="header">
        <h1 class="title">Metric/Imperial Unit Conversion</h1>

        <!-- Typable input (no default value) -->
        <input
          class="big-number"
          id="inputDisplay"
          type="text"
          inputmode="numeric"
          pattern="[0-9]*"
          placeholder="0"
          aria-label="Enter a number to convert"
          
        />

        <button class="btn" id="covertbtn" type="button">Convert</button>
      </header>

      <section class="content">
        <div class="panel">
          <h2>Length (Meter/Feet)</h2>
          <div class="value" id="lengthValue">
            0 meters = 0 feet | 0 feet = 0 meters
          </div>
        </div>

        <div class="panel">
          <h2>Volume (Liters/Gallons)</h2>
          <div class="value" id="volumeValue">
            0 liters = 0 gallons | 0 gallons = 0 liters
          </div>
        </div>

        <div class="panel">
          <h2>Mass (Kilograms/Pounds)</h2>
          <div class="value" id="massValue">
            0 kilos = 0 pounds | 0 pounds = 0 kilos
          </div>
        </div>
      </section>
    </main>
    <script  src="index.js"></script>
  </body>
</html>
